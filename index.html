<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#06AA48" />
  <title>Chuteira Cansada</title>
  <script>
    // Landing: redireciona conforme autenticação
    const token = localStorage.getItem('cc_token');
    const user = localStorage.getItem('cc_user');

    if (token && user) {
      try {
        const userData = JSON.parse(user);
        if (userData.role === 'admin') {
          window.location.href = '/dashboard.html';
        } else if (userData.role === 'associado') {
          window.location.href = '/inicio.html';
        } else {
          window.location.href = '/login.html';
        }
      } catch {
        window.location.href = '/login.html';
      }
    } else {
      window.location.href = '/login.html';
    }
  </script>
</head>
<body>
  <p style="text-align:center;margin-top:50px;">Redirecionando...</p>
</body>
</html>
