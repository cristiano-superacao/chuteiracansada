<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#06AA48" />
  <title>Login - Chuteira Cansada</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --brand-1: #06AA48;
      --brand-2: #028A3B;
      --brand-accent: #06AA48;
      --bg-color: #F5F5F5;
      --bg-cards: #FFFFFF;
      --text-dark: #212121;
      --text-light: #757575;
      --border-color: #E0E0E0;
      --shadow: 0 1px 3px rgba(0,0,0,0.12);
      --shadow-md: 0 4px 6px rgba(0,0,0,0.16);
      --shadow-lg: 0 10px 15px rgba(0,0,0,0.2);
      --radius: 12px;
      --radius-sm: 8px;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, var(--brand-1) 0%, var(--brand-2) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: var(--text-dark);
    }

    .login-container {
      background: var(--bg-cards);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      padding: 40px;
      width: 100%;
      max-width: 420px;
      animation: slideUp 0.4s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo-section {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-icon {
      font-size: 64px;
      margin-bottom: 12px;
      display: inline-block;
    }

    .logo-section h1 {
      font-size: 28px;
      font-weight: 700;
      color: var(--brand-1);
      margin-bottom: 8px;
    }

    .logo-section p {
      color: var(--text-light);
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dark);
      margin-bottom: 8px;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrapper i {
      position: absolute;
      left: 14px;
      color: var(--text-light);
      font-size: 16px;
    }

    input {
      width: 100%;
      padding: 11px 14px 11px 42px;
      border: 2px solid var(--border-color);
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-family: inherit;
      transition: all 0.2s ease;
      background: var(--bg-color);
    }

    input:focus {
      outline: none;
      border-color: var(--brand-1);
      background: var(--bg-cards);
      box-shadow: 0 0 0 3px rgba(6, 170, 72, 0.12);
    }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: var(--brand-1);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 8px;
      box-shadow: var(--shadow);
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary:hover {
      background: var(--brand-2);
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-primary:disabled {
      background: var(--text-light);
      cursor: not-allowed;
      transform: none;
    }

    .btn-google {
      width: 100%;
      padding: 14px;
      background: #FFFFFF;
      color: #3C4043;
      border: 2px solid var(--border-color);
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: var(--shadow);
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-decoration: none;
    }

    .btn-google:hover {
      background: #F8F9FA;
      border-color: #DADCE0;
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }

    .btn-google:active {
      transform: translateY(0);
    }

    .btn-google img {
      width: 18px;
      height: 18px;
    }

    .alert {
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
      align-items: center;
      gap: 10px;
    }

    .alert.show {
      display: flex;
    }

    .alert-error {
      background: #FFEBEE;
      color: #C62828;
      border-left: 4px solid var(--brand-1);
    }

    .alert-success {
      background: #E8F5E9;
      color: #2E7D32;
      border-left: 4px solid #4CAF50;
    }

    .divider {
      margin: 24px 0;
      text-align: center;
      position: relative;
    }

    .divider::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--border-color);
    }

    .divider span {
      position: relative;
      background: var(--bg-cards);
      padding: 0 16px;
      color: var(--text-light);
      font-size: 13px;
    }

    .help-text {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--text-light);
    }

    @media (max-width: 480px) {
      .login-container {
        padding: 28px 20px;
      }

      .logo-section h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo-section">
      <div class="logo-icon">⚽</div>
      <h1>Chuteira Cansada</h1>
      <p>Faça login para continuar</p>
    </div>

    <div id="alert" class="alert"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">E-mail</label>
        <div class="input-wrapper">
          <i class="fas fa-envelope"></i>
          <input 
            type="email" 
            id="email" 
            name="email" 
            placeholder="seu@email.com" 
            required 
            autocomplete="email"
          >
        </div>
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <div class="input-wrapper">
          <i class="fas fa-lock"></i>
          <input 
            type="password" 
            id="password" 
            name="password" 
            placeholder="••••••••" 
            required 
            autocomplete="current-password"
          >
        </div>
      </div>

      <button type="submit" class="btn-primary" id="loginBtn">
        <i class="fas fa-sign-in-alt"></i>
        <span>Entrar</span>
      </button>
    </form>

    <div class="divider">
      <span>OU</span>
    </div>

    <a href="/api/oauth/google" class="btn-google" id="googleLoginBtn">
      <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        <path fill="none" d="M0 0h48v48H0z"/>
      </svg>
      <span>Entrar com Google</span>
    </a>

    <div class="help-text">
      <i class="fas fa-info-circle"></i>
      Use seu e-mail e senha para entrar
    </div>
  </div>

  <script>
    const API_BASE = '';
    const TOKEN_KEY = 'cc_token';
    const USER_KEY = 'cc_user';

    async function readResponsePayload(response) {
      const contentType = String(response.headers.get('content-type') || '').toLowerCase();
      try {
        if (contentType.includes('application/json')) {
          return await response.json();
        }
        const text = await response.text();
        // Tenta JSON mesmo sem content-type correto
        try {
          return JSON.parse(text);
        } catch {
          return { message: text };
        }
      } catch {
        return {};
      }
    }

    // Captura parâmetros do callback do Google OAuth
    const urlParams = new URLSearchParams(window.location.search);
    const googleSuccess = urlParams.get('success');
    const googleToken = urlParams.get('token');
    const googleUser = urlParams.get('user');
    const googleError = urlParams.get('error');

    if (googleSuccess === 'true' && googleToken && googleUser) {
      try {
        const userData = JSON.parse(decodeURIComponent(googleUser));
        localStorage.setItem(TOKEN_KEY, googleToken);
        localStorage.setItem(USER_KEY, JSON.stringify(userData));
        
        showAlert('Login com Google realizado com sucesso!', 'success');
        
        setTimeout(() => {
          redirectByRole(userData.role);
        }, 500);
      } catch (err) {
        console.error('Erro ao processar dados do Google:', err);
        showAlert('Erro ao processar login com Google');
      }
    } else if (googleError) {
      const errorMessages = {
        'google_auth_failed': 'Falha na autenticação com Google. Tente novamente.',
        'server_error': 'Erro no servidor. Tente novamente mais tarde.',
        'google_not_configured': 'Login com Google não está configurado.'
      };
      showAlert(errorMessages[googleError] || 'Erro ao fazer login com Google');
      
      // Limpa a URL para remover os parâmetros de erro
      window.history.replaceState({}, document.title, '/login.html');
    }

    // Verifica se já está logado
    if (localStorage.getItem(TOKEN_KEY) && !googleSuccess) {
      checkAuthAndRedirect();
    }

    async function checkAuthAndRedirect() {
      try {
        const token = localStorage.getItem(TOKEN_KEY);
        if (!token) return;
        const response = await fetch(`${API_BASE}/api/auth/me`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await readResponsePayload(response);
        
        if (data.authenticated && data.user) {
          redirectByRole(data.user.role);
        } else if (!data.authenticated) {
          // Token inválido/expirado: limpa para evitar loops e UX confusa
          try { localStorage.removeItem(TOKEN_KEY); } catch {}
          try { localStorage.removeItem(USER_KEY); } catch {}
        }
      } catch (err) {
        // Evita poluir o console em caso de falhas transitórias (rede/cache)
      }
    }

    function redirectByRole(role) {
      if (role === 'admin') {
        window.location.href = '/dashboard.html';
      } else if (role === 'associado') {
        window.location.href = '/inicio.html';
      }
    }

    function showAlert(message, type = 'error') {
      const alert = document.getElementById('alert');
      alert.className = `alert alert-${type} show`;
      alert.innerHTML = `
        <i class="fas fa-${type === 'error' ? 'exclamation-circle' : 'check-circle'}"></i>
        <span>${message}</span>
      `;
      setTimeout(() => alert.classList.remove('show'), 5000);
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');

      if (!email || !password) {
        showAlert('Preencha e-mail e senha');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> <span>Entrando...</span>';

      try {
        const response = await fetch(`${API_BASE}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await readResponsePayload(response);

        if (!response.ok) {
          const code = String(data?.error || '');
          if (code === 'invalid_credentials' || response.status === 401) {
            showAlert(
              'E-mail ou senha incorretos. ' +
              'Se for admin: use o e-mail de ADMIN_EMAIL (padrão: admin@admin) e a senha de ADMIN_PASSWORD (Railway). ' +
              'Se for associado: a senha padrão é 123456 (ou ASSOCIADO_DEFAULT_PASSWORD).'
            );
          } else if (code === 'missing_credentials' || response.status === 400) {
            showAlert('Preencha e-mail e senha');
          } else if (code === 'server_misconfigured' || response.status === 500) {
            showAlert('Servidor não configurado para login (admin).');
          } else {
            showAlert('Não foi possível entrar agora.');
          }

          btn.disabled = false;
          btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> <span>Entrar</span>';
          return;
        }

        if (!data || !data.token || !data.user) {
          throw new Error('Resposta inválida do servidor.');
        }

        localStorage.setItem(TOKEN_KEY, data.token);
        localStorage.setItem(USER_KEY, JSON.stringify(data.user));

        showAlert('Login realizado com sucesso!', 'success');
        
        setTimeout(() => {
          redirectByRole(data.user.role);
        }, 500);

      } catch (err) {
        showAlert(String(err?.message || 'Erro ao fazer login'));
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> <span>Entrar</span>';
      }
    });

  </script>
</body>
</html>
